<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Любими ❤️</title>

    <!-- Красивый шрифт -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Анимации -->
<div id="hearts"></div>
<div id="petals"></div>
<div id="roses"></div>

<!-- ===================== Экран 1 ===================== -->

<section class="screen active" id="screen1">

    <div class="glass">

        <img src="images/minion.png" class="minion" alt="Миньон">

        <div class="heart">❤️</div>

        <h1 id="typing"></h1>

        <p id="typing2"></p>

        <button id="startBtn">
            Продолжить 💕
        </button>

    </div>

</section>

<!-- ===================== Экран 2 ===================== -->

<section class="screen" id="screen2">

    <div class="glass">

        <div class="bigHeart">💖</div>

        <h2 id="question"></h2>

        <div class="buttons">

            <button id="yesBtn">
                Да ❤️
            </button>

            <button id="noBtn">
                Нет 🙈
            </button>

        </div>

    </div>

</section>

<!-- ===================== Экран 3 ===================== -->

<section class="screen" id="screen3">

    <div class="envelope" id="envelope">

        <div class="envelope-top"></div>

        <div class="letter">

            <h2 id="loveText"></h2>

            <button id="nextDate">
                Выбрать дату 📅
            </button>

        </div>

    </div>

</section>

<!-- ===================== Экран 4 ===================== -->

<section class="screen" id="screen4">

    <div class="glass">

        <h2>Выбери дату ❤️</h2>

        <input type="date" id="date">

        <h3>Во сколько?</h3>

        <div class="times">

            <button class="time">14:00</button>
            <button class="time">16:00</button>
            <button class="time">18:00</button>
            <button class="time">20:00</button>

        </div>

        <button id="finish">
            Подтвердить ❤️
        </button>

    </div>

</section>

<!-- ===================== Экран 5 ===================== -->

<section class="screen" id="screen5">

    <div class="glass final">

        <h1>🌹❤️🌹</h1>

        <h2 id="finalText"></h2>

        <button id="hug">
            💖 Обнимаю тебя 💖
        </button>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
